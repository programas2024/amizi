<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Amizi · Chat</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        /* (Los estilos se mantienen igual que en la versión anterior) */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #f2f2f7;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* CONTENEDOR PRINCIPAL */
        .app-container {
            max-width: 900px;
            width: 100%;
            background-color: #f8f9ff;
            border-radius: 60px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.15);
            overflow: hidden;
            padding: 32px 36px;
            border: 1px solid rgba(255, 255, 255, 0.8);
        }

        /* HEADER CON DEGRADADO AZUL */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            background: linear-gradient(145deg, #4a90e2, #6c5ce7);
            padding: 15px 25px;
            border-radius: 60px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            flex-wrap: wrap;
            gap: 10px;
            box-shadow: 0 10px 25px rgba(74, 144, 226, 0.3);
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .star-icon {
            color: #ffd700;
            font-size: 28px;
            filter: drop-shadow(0 2px 5px rgba(255, 215, 0, 0.5));
        }

        .logo {
            font-size: 36px;
            font-weight: 800;
            color: white;
            letter-spacing: -1px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .carisma-badge {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(5px);
            border-radius: 60px;
            padding: 8px 18px;
            font-size: 18px;
            font-weight: 600;
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }

        .carisma-num {
            background: rgba(255, 255, 255, 0.4);
            border-radius: 30px;
            padding: 4px 14px;
            font-size: 16px;
            color: white;
            font-weight: 700;
        }

        .boost-btn {
            background: rgba(255, 255, 255, 0.95);
            border: none;
            border-radius: 60px;
            padding: 8px 20px;
            font-size: 18px;
            font-weight: 600;
            color: #4a90e2;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .boost-btn:hover {
            transform: scale(1.05);
            background: white;
        }

        .boost-btn i {
            color: #ff6b6b;
        }

        /* POPULAR ROW */
        .popular-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            background: white;
            padding: 12px 25px;
            border-radius: 60px;
            border: 1px solid #eeeff5;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .popular-row:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        }

        .popular-tag {
            font-size: 20px;
            color: #2d3a4a;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .popular-tag i {
            color: #ff6b6b;
            font-size: 22px;
        }

        .popular-tag span {
            font-weight: 700;
            color: #1e2b3a;
        }

        .menu-icon {
            font-size: 24px;
            color: #8a9bb0;
            cursor: pointer;
        }

        /* TARJETA DE CHAT */
        .chat-card {
            background: white;
            border-radius: 70px;
            padding: 0;
            border: 1px solid #f0f0f8;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.08);
            margin: 20px 0 30px 0;
            width: 100%;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 600px;
        }

        /* HEADER DEL CHAT */
        .chat-header {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 20px 25px;
            border-bottom: 2px solid #f0f3fa;
            background: white;
        }

        .chat-back {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: #f0f3fa;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .chat-back:hover {
            background: #4a90e2;
            color: white;
        }

        .chat-back i {
            font-size: 20px;
            color: #2d3a4a;
        }

        .chat-back:hover i {
            color: white;
        }

        .chat-user-avatar {
            position: relative;
        }

        .chat-user-avatar-img {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            overflow: hidden;
            background: linear-gradient(145deg, #4a90e2, #6c5ce7);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .chat-user-avatar-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .chat-user-avatar-img i {
            font-size: 30px;
            color: white;
        }

        .chat-user-status {
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #2ecc71;
            border: 2px solid white;
        }

        .chat-user-info {
            flex: 1;
        }

        .chat-user-name {
            font-size: 20px;
            font-weight: 700;
            color: #1e2b3a;
            margin-bottom: 3px;
        }

        .chat-user-status-text {
            font-size: 13px;
            color: #2ecc71;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .chat-actions {
            display: flex;
            gap: 8px;
        }

        .chat-info-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: #f0f3fa;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            color: #6c5ce7;
        }

        .chat-info-btn:hover {
            background: #4a90e2;
            color: white;
        }

        .chat-options-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: #f0f3fa;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            color: #2d3a4a;
        }

        .chat-options-btn:hover {
            background: #6c5ce7;
            color: white;
        }

        /* ÁREA DE MENSAJES */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9ff;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }

        .chat-messages::-webkit-scrollbar-track {
            background: #f0f3fa;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: #c0c4d0;
            border-radius: 10px;
        }

        .message {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            max-width: 80%;
            animation: fadeIn 0.3s ease;
            position: relative;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.received {
            align-self: flex-start;
        }

        .message.sent {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            overflow: hidden;
            background: linear-gradient(145deg, #4a90e2, #6c5ce7);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .message-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .message-avatar i {
            font-size: 18px;
            color: white;
        }

        .message.sent .message-avatar {
            background: #ff6b6b;
        }

        .message-content {
            background: white;
            padding: 12px 18px;
            border-radius: 25px;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.03);
            position: relative;
            transition: all 0.2s ease;
        }

        .message.received .message-content {
            border-bottom-left-radius: 5px;
        }

        .message.sent .message-content {
            border-bottom-right-radius: 5px;
            background: linear-gradient(145deg, #4a90e2, #6c5ce7);
            color: white;
        }

        /* Mensaje visto - cambio de color */
        .message.sent.visto .message-content {
            background: linear-gradient(145deg, #2ecc71, #27ae60);
        }

        .message-content p {
            font-size: 15px;
            line-height: 1.5;
            margin-bottom: 5px;
            word-wrap: break-word;
        }

        .message-footer {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 5px;
            margin-top: 2px;
        }

        .message-time {
            font-size: 11px;
            color: #8a9bb0;
        }

        .message.sent .message-time {
            color: rgba(255, 255, 255, 0.7);
        }

        .visto-icon {
            font-size: 12px;
            color: #ffd700;
            filter: drop-shadow(0 0 5px rgba(255, 215, 0, 0.5));
            animation: starPulse 1.5s infinite;
        }

        @keyframes starPulse {
            0%, 100% { opacity: 0.7; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        .double-check {
            font-size: 12px;
            color: #4a90e2;
        }

        .message.sent .double-check {
            color: rgba(255, 255, 255, 0.9);
        }

        /* ÁREA DE ESCRITURA */
        .chat-input-area {
            display: flex;
            gap: 10px;
            padding: 20px;
            background: white;
            border-top: 2px solid #f0f3fa;
        }

        .input-wrapper {
            flex: 1;
            position: relative;
        }

        .chat-input {
            width: 100%;
            padding: 15px 20px;
            border-radius: 60px;
            border: 2px solid #e4e4f0;
            background: white;
            font-size: 16px;
            transition: all 0.2s ease;
            outline: none;
        }

        .chat-input:focus {
            border-color: #4a90e2;
            box-shadow: 0 0 0 4px rgba(74, 144, 226, 0.1);
        }

        .chat-input::placeholder {
            color: #8a9bb0;
            font-size: 15px;
        }

        .send-btn {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background: linear-gradient(145deg, #4a90e2, #6c5ce7);
            border: none;
            color: white;
            font-size: 22px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .send-btn:hover:not(:disabled) {
            transform: scale(1.1);
            box-shadow: 0 10px 25px rgba(74, 144, 226, 0.3);
        }

        /* INDICADOR DE ESCRITURA */
        .typing-container {
            padding: 5px 20px 0 20px;
            background: #f8f9ff;
        }

        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 15px;
            background: white;
            border-radius: 30px;
            width: fit-content;
            margin-left: 45px;
            margin-bottom: 5px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.03);
            border: 1px solid #e4e4f0;
        }

        .typing-text {
            font-size: 13px;
            color: #5a6b7c;
            font-weight: 500;
        }

        .typing-dots {
            display: flex;
            gap: 4px;
        }

        .typing-dots span {
            width: 6px;
            height: 6px;
            background: #8a9bb0;
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        .typing-dots span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dots span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-6px); }
        }

        /* FOOTER */
        .footer-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: white;
            padding: 15px 20px;
            border-radius: 60px;
            border: 1px solid #eeeff5;
            margin-top: 20px;
            gap: 10px;
            width: 100%;
        }

        .footer-item {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 12px 20px;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s ease;
            flex: 1;
            white-space: nowrap;
            position: relative;
        }

        .footer-item::after {
            content: attr(data-tooltip);
            position: absolute;
            top: -40px;
            left: 50%;
            transform: translateX(-50%);
            background: #2d3a4a;
            color: white;
            padding: 6px 15px;
            border-radius: 30px;
            font-size: 14px;
            white-space: nowrap;
            opacity: 0;
            visibility: hidden;
            transition: all 0.2s ease;
            pointer-events: none;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .footer-item:hover::after {
            opacity: 1;
            visibility: visible;
            top: -45px;
        }

        .footer-item i {
            font-size: 24px;
        }

        .footer-item span {
            font-size: 18px;
            font-weight: 600;
        }

        .footer-item.inicio {
            background: #f0f3fa;
            color: #6c5ce7;
        }

        .footer-item.mensaje {
            background: linear-gradient(145deg, #6c5ce7, #8e6ce7);
            color: white;
        }

        .footer-item.likes {
            background: #ff4757;
            color: white;
        }

        .footer-item.cuenta {
            background: #2d3a4a;
            color: white;
        }

        .footer-item:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        }

        /* MODAL DE OPCIONES */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background: linear-gradient(145deg, #ffffff, #f8f9ff);
            border-radius: 50px;
            padding: 25px;
            max-width: 320px;
            width: 90%;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3);
            border: 2px solid rgba(255, 255, 255, 0.8);
            transform: scale(0.9);
            transition: transform 0.3s ease;
            position: relative;
        }

        .modal-overlay.active .modal-content {
            transform: scale(1);
        }

        .modal-close {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #f0f3fa;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .modal-close:hover {
            background: #ff6b6b;
            color: white;
        }

        .modal-options {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .modal-option {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 15px;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .modal-option:hover {
            background: #f0f3fa;
        }

        .modal-option.reportar:hover {
            background: #ff6b6b;
            color: white;
        }

        .modal-option.bloquear:hover {
            background: #2d3a4a;
            color: white;
        }

        .modal-option.vaciar:hover {
            background: #8a9bb0;
            color: white;
        }

        .option-icon {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        .option-icon.reportar {
            background: #ff6b6b;
            color: white;
        }

        .option-icon.bloquear {
            background: #2d3a4a;
            color: white;
        }

        .option-icon.vaciar {
            background: #8a9bb0;
            color: white;
        }

        .option-text {
            flex: 1;
            font-size: 15px;
            font-weight: 500;
        }

        /* NOTIFICACIONES */
        .notification-container {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            pointer-events: none;
            width: auto;
            max-width: 90%;
        }

        .notification {
            background: white;
            color: #1e2b3a;
            padding: 16px 32px;
            border-radius: 60px;
            font-size: 16px;
            font-weight: 500;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            gap: 12px;
            animation: slideDown 0.3s ease;
            pointer-events: none;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeOut {
            from { opacity: 1; transform: translateY(0); }
            to { opacity: 0; transform: translateY(-30px); }
        }

        /* ESTADO VACÍO */
        .empty-chat {
            text-align: center;
            padding: 40px;
            color: #5a6b7c;
        }

        .empty-chat i {
            font-size: 60px;
            color: #8a9bb0;
            margin-bottom: 20px;
        }

        .empty-chat p {
            font-size: 16px;
        }

        /* Estilos personalizados para SweetAlert2 */
        .swal-custom-popup {
            border-radius: 50px !important;
            padding: 30px !important;
        }

        .swal-custom-title {
            font-size: 28px !important;
            font-weight: 700 !important;
            color: #1e2b3a !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            gap: 10px !important;
            margin-bottom: 20px !important;
        }

        .swal-custom-content {
            max-height: 400px !important;
            overflow-y: auto !important;
            padding-right: 5px !important;
            scrollbar-width: none !important;
            -ms-overflow-style: none !important;
        }

        .swal-custom-content::-webkit-scrollbar {
            display: none !important;
        }

        .consejo-section {
            background: #f8f9ff;
            border-radius: 30px;
            padding: 20px;
            margin-bottom: 15px;
        }

        .consejo-section h4 {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 18px;
            margin-bottom: 15px;
        }

        .consejo-section ul {
            list-style: none;
            padding: 0;
        }

        .consejo-section li {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
            font-size: 14px;
            color: #2d3a4a;
        }

        .consejo-section li i {
            width: 20px;
            text-align: center;
        }

        .section-do {
            background: #e8f7f0;
        }

        .section-dont {
            background: #ffe8e8;
        }

        .section-tips {
            background: #e8f0fe;
        }

        .swal-custom-confirm {
            background: linear-gradient(145deg, #4a90e2, #6c5ce7) !important;
            border-radius: 60px !important;
            padding: 12px 40px !important;
            font-size: 16px !important;
            font-weight: 600 !important;
            border: none !important;
            box-shadow: 0 10px 20px rgba(108, 92, 231, 0.3) !important;
            transition: all 0.2s !important;
        }

        .swal-custom-confirm:hover {
            transform: translateY(-2px) !important;
            box-shadow: 0 15px 25px rgba(108, 92, 231, 0.4) !important;
        }

        /* RESPONSIVE */
        @media (max-width: 700px) {
            .app-container {
                padding: 20px;
            }

            .chat-card {
                height: 500px;
            }

            .footer-nav {
                flex-wrap: wrap;
                gap: 8px;
            }
            
            .footer-item {
                flex: 1 1 calc(50% - 8px);
                min-width: 120px;
            }
        }
    </style>
</head>
<body>
    <!-- CONTENEDOR DE NOTIFICACIONES -->
    <div class="notification-container" id="notificationContainer"></div>

    <!-- MODAL DE OPCIONES -->
    <div class="modal-overlay" id="chatOptionsModal">
        <div class="modal-content">
            <div class="modal-close" id="closeOptionsModal">
                <i class="fas fa-times"></i>
            </div>
            <div class="modal-options">
                <div class="modal-option reportar" id="optionReportar">
                    <div class="option-icon reportar">
                        <i class="fas fa-flag"></i>

    <script>
        const supabaseUrl = "https://qfwpikteqipzwpmqbllt.supabase.co";
        const supabaseKey = "sb_publishable_W75gkuE187xY7qWeQsP6XQ_3IWzPC3A";
        
        const { createClient } = supabase;
        const supabaseClient = createClient(supabaseUrl, supabaseKey);

        document.addEventListener('DOMContentLoaded', async function() {
            // ============================================
            // OBTENER PARÁMETROS DE LA URL
            // ============================================
            const urlParams = new URLSearchParams(window.location.search);
            const otroUsuarioId = parseInt(urlParams.get('id')) || null;
            const otroUsuarioNombre = urlParams.get('nombre') || 'Usuario';

            // ============================================
            // ELEMENTOS DEL DOM
            // ============================================
            const chatUserName = document.getElementById('chatUserName');
            const chatUserStatus = document.getElementById('chatUserStatus');
            const chatUserAvatar = document.getElementById('chatUserAvatar');
            const chatMessages = document.getElementById('chatMessages');
            const chatInput = document.getElementById('chatInput');
            const sendBtn = document.getElementById('sendMessageBtn');
            const backButton = document.getElementById('backButton');
            const chatBackButton = document.getElementById('chatBackButton');
            const chatInfoBtn = document.getElementById('chatInfoBtn');
            const chatOptionsBtn = document.getElementById('chatOptionsBtn');
            const modalOverlay = document.getElementById('chatOptionsModal');
            const closeModal = document.getElementById('closeOptionsModal');
            const optionReportar = document.getElementById('optionReportar');
            const optionBloquear = document.getElementById('optionBloquear');
            const optionVaciar = document.getElementById('optionVaciar');
            const nivelValor = document.getElementById('nivelValor');
            const footerLikesCount = document.getElementById('footerLikesCount');
            const typingContainer = document.getElementById('typingContainer');
            
            // Botones del footer
            const btnBoost = document.getElementById('btnBoost');
            const btnInicio = document.getElementById('btnInicio');
            const btnMessage = document.getElementById('btnMessage');
            const btnLikesFooter = document.getElementById('btnLikesFooter');
            const btnCuenta = document.getElementById('btnCuenta');

            // ============================================
            // VARIABLES GLOBALES
            // ============================================
            let usuarioActual = null;
            let usuarioId = null;
            let chatId = null;
            let subscription = null;
            let pollingInterval = null;
            let ultimoMensajeId = 0;
            let typingTimeout = null;
            let enviandoMensaje = false;
            let mensajesIds = new Set();

            // ============================================
            // FUNCIÓN DE NOTIFICACIONES
            // ============================================
            function showNotification(text, bgColor = '#4a90e2', icon = 'fa-info-circle') {
                const container = document.getElementById('notificationContainer');
                const notification = document.createElement('div');
                notification.className = 'notification';
                notification.innerHTML = `<i class="fas ${icon}" style="color: white"></i> ${text}`;
                notification.style.background = bgColor;
                notification.style.color = 'white';
                container.appendChild(notification);

                setTimeout(() => {
                    notification.style.animation = 'fadeOut 0.3s ease';
                    setTimeout(() => {
                        if (container.contains(notification)) {
                            container.removeChild(notification);
                        }
                    }, 300);
                }, 2500);
            }

            // ============================================
            // FUNCIÓN PARA MOSTRAR CONSEJOS DEL CHAT
            // ============================================
            function mostrarConsejosChat() {
                Swal.fire({
                    title: `
                        <div class="swal-custom-title">
                            <i class="fas fa-info-circle" style="color: #4a90e2;"></i>
                            Consejos para el Chat
                        </div>
                    `,
                    html: `
                        <div class="swal-custom-content">
                            <div class="consejo-section section-do">
                                <h4>
                                    <i class="fas fa-check-circle" style="color: #2ecc71;"></i>
                                    <span style="color: #2ecc71;">Lo que SÍ debes hacer</span>
                                </h4>
                                <ul>
                                    <li><i class="fas fa-smile" style="color: #2ecc71;"></i> Ser respetuoso y amable</li>
                                    <li><i class="fas fa-comments" style="color: #2ecc71;"></i> Usar un lenguaje apropiado</li>
                                    <li><i class="fas fa-heart" style="color: #2ecc71;"></i> Compartir intereses comunes</li>
                                    <li><i class="fas fa-sun" style="color: #2ecc71;"></i> Mantener conversaciones positivas</li>
                                    <li><i class="fas fa-flag" style="color: #2ecc71;"></i> Reportar comportamientos inapropiados</li>
                                </ul>
                            </div>
                            
                            <div class="consejo-section section-dont">
                                <h4>
                                    <i class="fas fa-times-circle" style="color: #ff6b6b;"></i>
                                    <span style="color: #ff6b6b;">Lo que NO debes hacer</span>
                                </h4>
                                <ul>
                                    <li><i class="fas fa-lock" style="color: #ff6b6b;"></i> No compartas información personal</li>
                                    <li><i class="fas fa-ban" style="color: #ff6b6b;"></i> Evita lenguaje ofensivo</li>
                                    <li><i class="fas fa-envelope" style="color: #ff6b6b;"></i> No hagas spam</li>
                                    <li><i class="fas fa-exclamation-triangle" style="color: #ff6b6b;"></i> No acoses ni intimides</li>
                                    <li><i class="fas fa-image" style="color: #ff6b6b;"></i> No compartas contenido inapropiado</li>
                                </ul>
                            </div>
                            
                            <div class="consejo-section section-tips">
                                <h4>
                                    <i class="fas fa-lightbulb" style="color: #f39c12;"></i>
                                    <span style="color: #f39c12;">Consejos adicionales</span>
                                </h4>
                                <ul>
                                    <li><i class="fas fa-user" style="color: #f39c12;"></i> Sé tú mismo, auténtico</li>
                                    <li><i class="fas fa-ear-listen" style="color: #f39c12;"></i> Escucha y muestra interés</li>
                                    <li><i class="fas fa-shield-alt" style="color: #f39c12;"></i> Si algo te incomoda, reporta</li>
                                    <li><i class="fas fa-heart" style="color: #f39c12;"></i> Disfruta conocer nuevas personas</li>
                                </ul>
                            </div>
                            
                            <div style="margin-top: 20px; text-align: center; color: #8a9bb0; font-size: 12px;">
                                <i class="fas fa-star" style="color: #ffd700;"></i> Amizi, un lugar para conectar
                            </div>
                        </div>
                    `,
                    confirmButtonText: 'Entendido',
                    confirmButtonColor: '#6c5ce7',
                    background: 'white',
                    width: '500px',
                    customClass: {
                        popup: 'swal-custom-popup',
                        confirmButton: 'swal-custom-confirm'
                    },
                    showCloseButton: true,
                    closeButtonHtml: '<i class="fas fa-times"></i>'
                });
            }

            // ============================================
            // HABILITAR/DESHABILITAR BOTÓN DE ENVÍO
            // ============================================
            function actualizarEstadoBoton() {
                if (sendBtn) {
                    sendBtn.disabled = !chatInput.value.trim() || enviandoMensaje;
                }
            }

            // ============================================
            // OBTENER USUARIO ACTUAL
            // ============================================
            async function obtenerUsuarioActual() {
                try {
                    const usuarioGuardado = sessionStorage.getItem('usuario_actual');
                    
                    if (!usuarioGuardado) {
                        window.location.href = 'login.html';
                        return null;
                    }

                    usuarioActual = JSON.parse(usuarioGuardado);
                    usuarioId = usuarioActual.id;

                    const { data: usuario, error } = await supabaseClient
                        .from('usuarios')
                        .select('*')
                        .eq('id_usuario', usuarioId)
                        .single();

                    if (error) throw error;

                    nivelValor.textContent = usuario.nivel || 1;
                    
                    // Cargar avatar del usuario actual
                    const { data: fotos } = await supabaseClient
                        .from('fotos_usuario')
                        .select('url_foto')
                        .eq('id_usuario', usuarioId)
                        .eq('principal', true)
                        .maybeSingle();
                        
                    usuarioActual.foto_principal = fotos?.url_foto || usuario.foto_url;
                    
                    return usuario;
                } catch (error) {
                    console.error('Error al obtener usuario:', error);
                    return null;
                }
            }

            // ============================================
            // OBTENER INFO DEL OTRO USUARIO
            // ============================================
            async function obtenerOtroUsuario() {
                try {
                    const { data: usuario, error } = await supabaseClient
                        .from('usuarios')
                        .select('*')
                        .eq('id_usuario', otroUsuarioId)
                        .single();

                    if (error) throw error;

                    // Obtener foto principal
                    const { data: fotos } = await supabaseClient
                        .from('fotos_usuario')
                        .select('url_foto')
                        .eq('id_usuario', otroUsuarioId)
                        .eq('principal', true)
                        .maybeSingle();
                        
                    usuario.foto_principal = fotos?.url_foto || usuario.foto_url;
                    
                    return usuario;
                } catch (error) {
                    console.error('Error al obtener otro usuario:', error);
                    return null;
                }
            }

            // ============================================
            // OBTENER O CREAR ID DEL CHAT
            // ============================================
            async function obtenerOCrearChatId() {
                try {
                    const { data: matches, error: matchError } = await supabaseClient
                        .from('matches')
                        .select('id_match')
                        .or(`and(usuario1.eq.${usuarioId},usuario2.eq.${otroUsuarioId}),and(usuario1.eq.${otroUsuarioId},usuario2.eq.${usuarioId})`)
                        .maybeSingle();

                    if (matchError) throw matchError;

                    if (!matches) {
                        showNotification('No hay match con este usuario', '#ff6b6b', 'fa-exclamation-circle');
                        setTimeout(() => {
                            window.location.href = 'mensajes.html';
                        }, 2000);
                        return null;
                    }

                    chatId = matches.id_match;
                    return chatId;
                } catch (error) {
                    console.error('Error al obtener chat:', error);
                    return null;
                }
            }

            // ============================================
            // VERIFICAR SI EL CHAT ESTÁ OCULTO PARA EL USUARIO
            // ============================================
            async function verificarChatOculto() {
                try {
                    const { data: oculto, error } = await supabaseClient
                        .from('chats_ocultos')
                        .select('*')
                        .eq('id_usuario', usuarioId)
                        .eq('id_chat', chatId)
                        .maybeSingle();

                    if (error) throw error;
                    
                    return !!oculto;
                } catch (error) {
                    console.error('Error al verificar chat oculto:', error);
                    return false;
                }
            }

            // ============================================
            // RENDERIZAR UN MENSAJE
            // ============================================
            function renderizarMensaje(msg, esNuevo = true, visto = false) {
                const esMio = msg.id_usuario === usuarioId;
                const fecha = new Date(msg.fecha);
                const hora = `${fecha.getHours()}:${String(fecha.getMinutes()).padStart(2, '0')}`;
                
                // Guardar ID en el Set
                mensajesIds.add(msg.id_mensaje);
                
                // Verificar si ya existe este mensaje en el DOM
                if (document.querySelector(`[data-mensaje-id="${msg.id_mensaje}"]`)) {
                    return; // Ya está renderizado, no duplicar
                }
                
                const messageDiv = document.createElement('div');
                messageDiv.className = `message ${esMio ? 'sent' : 'received'} ${visto ? 'visto' : ''}`;
                messageDiv.dataset.mensajeId = msg.id_mensaje;
                
                const messageFooter = esMio ? `
                    <div class="message-footer">
                        <span class="message-time">${hora}</span>
                        ${visto ? '<i class="fas fa-star visto-icon" title="Visto"></i>' : '<i class="fas fa-check double-check" title="Entregado"></i>'}
                    </div>
                ` : `
                    <div class="message-footer">
                        <span class="message-time">${hora}</span>
                    </div>
                `;
                
                messageDiv.innerHTML = `
                    <div class="message-avatar">
                        ${esMio 
                            ? (usuarioActual.foto_principal ? `<img src="${usuarioActual.foto_principal}" alt="Yo">` : '<i class="fas fa-user"></i>')
                            : (window.otroUsuario?.foto_principal ? `<img src="${window.otroUsuario.foto_principal}" alt="${window.otroUsuario.nombre}">` : '<i class="fas fa-user"></i>')
                        }
                    </div>
                    <div class="message-content">
                        <p>${msg.mensaje}</p>
                        ${messageFooter}
                    </div>
                `;
                
                chatMessages.appendChild(messageDiv);
                chatMessages.scrollTop = chatMessages.scrollHeight;
                
                // Actualizar último ID
                if (msg.id_mensaje > ultimoMensajeId) {
                    ultimoMensajeId = msg.id_mensaje;
                }
            }

            // ============================================
            // ACTUALIZAR ESTADO DE VISTO EN LA UI
            // ============================================
            function actualizarEstadoVisto(idMensaje) {
                const mensajeDiv = document.querySelector(`[data-mensaje-id="${idMensaje}"]`);
                if (mensajeDiv && mensajeDiv.classList.contains('sent') && !mensajeDiv.classList.contains('visto')) {
                    mensajeDiv.classList.add('visto');
                    const footer = mensajeDiv.querySelector('.message-footer');
                    if (footer) {
                        const timeSpan = footer.querySelector('.message-time');
                        const hora = timeSpan ? timeSpan.textContent : '';
                        footer.innerHTML = `
                            <span class="message-time">${hora}</span>
                            <i class="fas fa-star visto-icon" title="Visto"></i>
                        `;
                    }
                }
            }

            // ============================================
            // MARCAR MENSAJES COMO VISTOS
            // ============================================
            async function marcarMensajesComoVistos() {
                try {
                    const mensajesNoVistos = Array.from(document.querySelectorAll('.message.received[data-mensaje-id]'))
                        .map(el => el.dataset.mensajeId)
                        .filter(id => !window.mensajesVistos?.has(parseInt(id)));

                    if (mensajesNoVistos.length === 0) return;

                    const { error } = await supabaseClient
                        .from('mensajes')
                        .update({ visto: true })
                        .in('id_mensaje', mensajesNoVistos);

                    if (error) throw error;

                    for (const id of mensajesNoVistos) {
                        actualizarEstadoVisto(parseInt(id));
                    }

                    if (!window.mensajesVistos) window.mensajesVistos = new Set();
                    mensajesNoVistos.forEach(id => window.mensajesVistos.add(parseInt(id)));

                } catch (error) {
                    console.error('Error al marcar mensajes como vistos:', error);
                }
            }

            // ============================================
            // CARGAR MENSAJES INICIALES (EXCLUYENDO OCULTOS)
            // ============================================
            async function cargarMensajesIniciales() {
                try {
                    // Verificar si el chat está oculto
                    const oculto = await verificarChatOculto();
                    
                    if (oculto) {
                        chatMessages.innerHTML = `
                            <div class="empty-chat">
                                <i class="fas fa-eye-slash"></i>
                                <p>Has ocultado este chat</p>
                                <p style="font-size: 14px; margin-top: 10px;">Los mensajes se muestran cuando vuelvas a hablar</p>
                            </div>
                        `;
                        return;
                    }

                    const { data: mensajes, error } = await supabaseClient
                        .from('mensajes')
                        .select('*')
                        .eq('id_chat', chatId)
                        .order('fecha', { ascending: true });

                    if (error) throw error;

                    if (!mensajes || mensajes.length === 0) {
                        chatMessages.innerHTML = `
                            <div class="empty-chat">
                                <i class="fas fa-comment-dots"></i>
                                <p>No hay mensajes aún</p>
                                <p style="font-size: 14px; margin-top: 10px;">Envía el primer mensaje para iniciar la conversación</p>
                            </div>
                        `;
                        return;
                    }

                    chatMessages.innerHTML = '';
                    
                    window.mensajesVistos = new Set();
                    
                    mensajes.forEach(msg => {
                        renderizarMensaje(msg, false, msg.visto || false);
                        
                        if (msg.id_mensaje > ultimoMensajeId) {
                            ultimoMensajeId = msg.id_mensaje;
                        }
                        
                        if (msg.id_usuario !== usuarioId && msg.visto) {
                            window.mensajesVistos.add(msg.id_mensaje);
                        }
                    });
                    
                    chatMessages.scrollTop = chatMessages.scrollHeight;
                    
                    await marcarMensajesComoVistos();
                    
                } catch (error) {
                    console.error('Error al cargar mensajes:', error);
                }
            }

            // ============================================
            // VERIFICAR NUEVOS MENSAJES (EXCLUYENDO OCULTOS)
            // ============================================
            async function verificarNuevosMensajes() {
                if (!chatId) return;
                
                try {
                    // Verificar si el chat está oculto
                    const oculto = await verificarChatOculto();
                    if (oculto) return;
                    
                    const { data: nuevosMensajes, error } = await supabaseClient
                        .from('mensajes')
                        .select('*')
                        .eq('id_chat', chatId)
                        .gt('id_mensaje', ultimoMensajeId)
                        .order('fecha', { ascending: true });

                    if (error) throw error;

                    if (nuevosMensajes && nuevosMensajes.length > 0) {
                        const emptyChat = chatMessages.querySelector('.empty-chat');
                        if (emptyChat) {
                            chatMessages.innerHTML = '';
                        }
                        
                        nuevosMensajes.forEach(msg => {
                            if (!document.querySelector(`[data-mensaje-id="${msg.id_mensaje}"]`)) {
                                renderizarMensaje(msg, true, msg.visto || false);
                            }
                        });
                    }
                    
                    const mensajesEnviadosIds = Array.from(document.querySelectorAll('.message.sent[data-mensaje-id]'))
                        .map(el => parseInt(el.dataset.mensajeId));
                    
                    if (mensajesEnviadosIds.length > 0) {
                        const { data: mensajesEnviados, error: errorVistos } = await supabaseClient
                            .from('mensajes')
                            .select('id_mensaje, visto')
                            .eq('id_chat', chatId)
                            .eq('id_usuario', usuarioId)
                            .in('id_mensaje', mensajesEnviadosIds);

                        if (errorVistos) throw errorVistos;

                        if (mensajesEnviados) {
                            mensajesEnviados.forEach(msg => {
                                if (msg.visto) {
                                    actualizarEstadoVisto(msg.id_mensaje);
                                }
                            });
                        }
                    }
                    
                } catch (error) {
                    console.error('Error en polling:', error);
                }
            }

            // ============================================
            // INICIAR POLLING
            // ============================================
            function iniciarPolling() {
                if (pollingInterval) clearInterval(pollingInterval);
                
                pollingInterval = setInterval(async () => {
                    await verificarNuevosMensajes();
                    await marcarMensajesComoVistos();
                }, 1000);
            }

            // ============================================
            // OCULTAR CHAT PARA EL USUARIO ACTUAL
            // ============================================
            async function ocultarChat() {
                try {
                    // Verificar si ya está oculto
                    const yaOculto = await verificarChatOculto();
                    
                    if (yaOculto) {
                        showNotification('Este chat ya estaba oculto', '#8a9bb0', 'fa-eye-slash');
                        modalOverlay.classList.remove('active');
                        return;
                    }
                    
                    const { error } = await supabaseClient
                        .from('chats_ocultos')
                        .insert([{
                            id_usuario: usuarioId,
                            id_chat: chatId
                        }]);

                    if (error) throw error;

                    chatMessages.innerHTML = `
                        <div class="empty-chat">
                            <i class="fas fa-eye-slash"></i>
                            <p>Has ocultado este chat</p>
                            <p style="font-size: 14px; margin-top: 10px;">Los mensajes se muestran cuando vuelvas a hablar</p>
                        </div>
                    `;
                    
                    showNotification('🗑️ Chat ocultado', '#8a9bb0', 'fa-eye-slash');
                    modalOverlay.classList.remove('active');
                    
                } catch (error) {
                    console.error('Error al ocultar chat:', error);
                    showNotification('Error al ocultar chat', '#ff6b6b', 'fa-exclamation-circle');
                }
            }

            // ============================================
            // ENVIAR MENSAJE (DESOCULTA EL CHAT AUTOMÁTICAMENTE)
            // ============================================
            async function enviarMensaje() {
                const texto = chatInput.value.trim();
                if (!texto || enviandoMensaje) return;

                enviandoMensaje = true;
                actualizarEstadoBoton();

                try {
                    // Verificar si el chat estaba oculto y desocultarlo
                    const oculto = await verificarChatOculto();
                    if (oculto) {
                        await supabaseClient
                            .from('chats_ocultos')
                            .delete()
                            .eq('id_usuario', usuarioId)
                            .eq('id_chat', chatId);
                    }

                    const { data, error } = await supabaseClient
                        .from('mensajes')
                        .insert([{
                            id_chat: chatId,
                            id_usuario: usuarioId,
                            mensaje: texto,
                            fecha: new Date().toISOString(),
                            visto: false
                        }])
                        .select();

                    if (error) throw error;

                    chatInput.value = '';
                    
                    if (data && data[0] && !document.querySelector(`[data-mensaje-id="${data[0].id_mensaje}"]`)) {
                        const emptyChat = chatMessages.querySelector('.empty-chat');
                        if (emptyChat) {
                            chatMessages.innerHTML = '';
                        }
                        renderizarMensaje(data[0], true, false);
                    }
                } catch (error) {
                    console.error('Error al enviar mensaje:', error);
                    showNotification('Error al enviar mensaje', '#ff6b6b', 'fa-exclamation-circle');
                } finally {
                    enviandoMensaje = false;
                    actualizarEstadoBoton();
                    chatInput.focus();
                }
            }

            // ============================================
            // INDICADOR DE ESCRITURA
            // ============================================
            function mostrarEscribiendo() {
                if (!typingContainer) return;
                
                typingContainer.style.display = 'block';
                
                if (typingTimeout) clearTimeout(typingTimeout);
                typingTimeout = setTimeout(() => {
                    typingContainer.style.display = 'none';
                }, 2000);
            }

            // ============================================
            // ACTUALIZAR HEADER
            // ============================================
            function actualizarHeader(otroUsuario) {
                if (chatUserName) {
                    chatUserName.textContent = otroUsuario.nombre || 'Usuario';
                }
                
                if (chatUserAvatar) {
                    if (otroUsuario.foto_principal) {
                        chatUserAvatar.innerHTML = `<img src="${otroUsuario.foto_principal}" alt="${otroUsuario.nombre}">`;
                    } else {
                        chatUserAvatar.innerHTML = '<i class="fas fa-user"></i>';
                    }
                }
                
                if (chatUserStatus) {
                    chatUserStatus.innerHTML = '<i class="fas fa-circle" style="color: #2ecc71; font-size: 8px;"></i> En línea';
                }
                
                window.otroUsuario = otroUsuario;
            }

            // ============================================
            // LIMPIAR RECURSOS
            // ============================================
            function limpiarRecursos() {
                if (pollingInterval) clearInterval(pollingInterval);
                if (subscription) subscription.unsubscribe();
                if (typingTimeout) clearTimeout(typingTimeout);
            }

            // ============================================
            // EVENT LISTENERS
            // ============================================
            
            if (chatInput) {
                chatInput.addEventListener('input', () => {
                    actualizarEstadoBoton();
                    mostrarEscribiendo();
                });
            }

            if (sendBtn) {
                sendBtn.addEventListener('click', enviarMensaje);
            }

            if (chatInput) {
                chatInput.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter' && !e.shiftKey) {
                        e.preventDefault();
                        if (!enviandoMensaje && chatInput.value.trim()) {
                            enviarMensaje();
                        }
                    }
                });
            }

            if (chatInfoBtn) {
                chatInfoBtn.addEventListener('click', mostrarConsejosChat);
            }

            const volverAMensajes = () => {
                limpiarRecursos();
                showNotification('Volviendo a mensajes...', '#6c5ce7', 'fa-arrow-left');
                setTimeout(() => {
                    window.location.href = 'mensajes.html';
                }, 300);
            };

            if (backButton) {
                backButton.addEventListener('click', volverAMensajes);
            }

            if (chatBackButton) {
                chatBackButton.addEventListener('click', volverAMensajes);
            }

            if (chatOptionsBtn) {
                chatOptionsBtn.addEventListener('click', () => {
                    modalOverlay.classList.add('active');
                });
            }

            if (closeModal) {
                closeModal.addEventListener('click', () => {
                    modalOverlay.classList.remove('active');
                });
            }

            if (modalOverlay) {
                modalOverlay.addEventListener('click', function(e) {
                    if (e.target === modalOverlay) {
                        modalOverlay.classList.remove('active');
                    }
                });
            }

            if (optionReportar) {
                optionReportar.addEventListener('click', () => {
                    showNotification('📢 Conversación reportada', '#ff6b6b', 'fa-flag');
                    modalOverlay.classList.remove('active');
                });
            }

            if (optionBloquear) {
                optionBloquear.addEventListener('click', () => {
                    showNotification('🚫 Usuario bloqueado', '#2d3a4a', 'fa-ban');
                    modalOverlay.classList.remove('active');
                });
            }

            // Cambiamos "Vaciar" por "Ocultar"
            if (optionVaciar) {
                optionVaciar.addEventListener('click', ocultarChat);
            }

            if (btnBoost) {
                btnBoost.addEventListener('click', function() {
                    this.style.transform = 'scale(1.1)';
                    setTimeout(() => this.style.transform = 'scale(1)', 200);
                    
                    if (typeof mostrarModalBoost === 'function') {
                        mostrarModalBoost();
                    } else {
                        showNotification('🚀 Función de Boost próximamente', '#ff6b6b', 'fa-rocket');
                    }
                });
            }

            if (btnInicio) {
                btnInicio.addEventListener('click', (e) => {
                    e.preventDefault();
                    limpiarRecursos();
                    showNotification('🏠 Página de inicio', '#6c5ce7', 'fa-home');
                    setTimeout(() => {
                        window.location.href = 'principal.html';
                    }, 300);
                });
            }

            if (btnMessage) {
                btnMessage.addEventListener('click', volverAMensajes);
            }

            if (btnLikesFooter) {
                btnLikesFooter.addEventListener('click', function() {
                    this.style.transform = 'scale(1.1)';
                    setTimeout(() => this.style.transform = 'scale(1)', 200);
                    limpiarRecursos();
                    setTimeout(() => {
                        window.location.href = 'like.html';
                    }, 300);
                });
            }

            if (btnCuenta) {
                btnCuenta.addEventListener('click', (e) => {
                    e.preventDefault();
                    limpiarRecursos();
                    showNotification('👤 Mi perfil', '#2d3a4a', 'fa-user');
                    setTimeout(() => {
                        window.location.href = 'cuenta.html';
                    }, 300);
                });
            }

            // ============================================
            // INICIALIZACIÓN
            // ============================================
            const usuario = await obtenerUsuarioActual();
            if (!usuario) return;

            if (!otroUsuarioId) {
                showNotification('ID de usuario no válido', '#ff6b6b', 'fa-exclamation-circle');
                setTimeout(() => {
                    window.location.href = 'mensajes.html';
                }, 2000);
                return;
            }

            const otroUsuario = await obtenerOtroUsuario();
            if (!otroUsuario) {
                showNotification('Usuario no encontrado', '#ff6b6b', 'fa-exclamation-circle');
                setTimeout(() => {
                    window.location.href = 'mensajes.html';
                }, 2000);
                return;
            }

            actualizarHeader(otroUsuario);

            const chat = await obtenerOCrearChatId();
            if (!chat) return;

            
            await cargarMensajesIniciales();
            iniciarPolling();

            const { count } = await supabaseClient
                .from('likes')
                .select('*', { count: 'exact', head: true })
                .eq('id_usuario_destino', usuarioId);
            footerLikesCount.textContent = count || 0;

            window.addEventListener('beforeunload', limpiarRecursos);
        });
    </script>
</body>
</html>
