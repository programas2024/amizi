<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Amizi · Conoce amigos</title>
    <!-- Font Awesome para iconos más lindos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #f2f2f7;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .app-container {
            max-width: 800px;
            width: 100%;
            background-color: #f8f9ff;
            border-radius: 60px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.15);
            overflow: hidden;
            padding: 32px 36px;
            border: 1px solid rgba(255, 255, 255, 0.8);
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            background: linear-gradient(145deg, #4a90e2, #6c5ce7);
            padding: 15px 25px;
            border-radius: 60px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            flex-wrap: wrap;
            gap: 10px;
            box-shadow: 0 10px 25px rgba(74, 144, 226, 0.3);
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .star-icon {
            color: #ffd700;
            font-size: 28px;
            filter: drop-shadow(0 2px 5px rgba(255, 215, 0, 0.5));
        }

        .logo {
            font-size: 36px;
            font-weight: 800;
            color: white;
            letter-spacing: -1px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .carisma-badge {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(5px);
            border-radius: 60px;
            padding: 8px 18px;
            font-size: 18px;
            font-weight: 600;
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }

        .carisma-num {
            background: rgba(255, 255, 255, 0.4);
            border-radius: 30px;
            padding: 4px 14px;
            font-size: 16px;
            color: white;
            font-weight: 700;
        }

        .boost-btn {
            background: rgba(255, 255, 255, 0.95);
            border: none;
            border-radius: 60px;
            padding: 8px 20px;
            font-size: 18px;
            font-weight: 600;
            color: #4a90e2;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .boost-btn:hover {
            transform: scale(1.05);
            background: white;
        }

        .boost-btn i {
            color: #ff6b6b;
        }

        /* Contenedor de monedas y VIP */
        .monedas-container {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 10px;
            margin-bottom: 15px;
            padding: 0 5px;
        }

        .monedas-badge {
            background: linear-gradient(145deg, #f9e68c, #f1c40f);
            border-radius: 40px;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 5px 15px rgba(241, 196, 15, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .monedas-badge i {
            color: #ffffff;
            font-size: 18px;
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.2));
        }

        .monedas-badge span {
            font-weight: 700;
            color: #1e2b3a;
            font-size: 16px;
        }

        .vip-btn {
            background: linear-gradient(145deg, #9b59b6, #8e44ad);
            border: none;
            border-radius: 40px;
            padding: 8px 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 5px 15px rgba(155, 89, 182, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .vip-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(155, 89, 182, 0.4);
        }

        .vip-btn i {
            color: #ffd700;
            font-size: 18px;
            filter: drop-shadow(0 0 5px rgba(255, 215, 0, 0.5));
        }

        .vip-btn span {
            font-weight: 600;
            color: white;
            font-size: 16px;
        }

        .popular-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            background: white;
            padding: 12px 25px;
            border-radius: 60px;
            border: 1px solid #eeeff5;
        }

        .popular-tag {
            font-size: 20px;
            color: #2d3a4a;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .popular-tag i {
            color: #ff6b6b;
            font-size: 22px;
        }

        .popular-tag span {
            font-weight: 700;
            color: #1e2b3a;
        }

        .menu-icon {
            font-size: 24px;
            color: #8a9bb0;
            cursor: pointer;
        }

        .profile-card {
            background: white;
            border-radius: 70px;
            padding: 50px 50px 40px 50px;
            border: 1px solid #f0f0f8;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.08);
            margin: 20px 0 30px 0;
            width: 100%;
        }

        /* CARRUSEL DE FOTOS */
        .avatar-carousel {
            position: relative;
            width: 100%;
            max-width: 280px;
            margin: 0 auto 20px;
        }

        .carousel-container {
            position: relative;
            width: 280px;
            height: 280px;
            margin: 0 auto;
            border-radius: 50%;
            overflow: hidden;
            box-shadow: 0 25px 45px rgba(108, 92, 231, 0.35);
            border: 8px solid white;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .carousel-container:hover {
            transform: scale(1.02);
        }

        .carousel-slide {
            display: flex;
            transition: transform 0.3s ease;
            height: 100%;
        }

        .carousel-item {
            flex: 0 0 100%;
            height: 100%;
            background: linear-gradient(145deg, #6c5ce7, #a363d9);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .carousel-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .carousel-item i {
            font-size: 140px;
            color: white;
        }

        .carousel-indicators {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            z-index: 10;
        }

        .indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.5);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .indicator.active {
            background: #ffd700;
            transform: scale(1.2);
        }

        .carousel-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: white;
            border: none;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: #6c5ce7;
            transition: all 0.2s ease;
            z-index: 10;
        }

        .carousel-btn:hover {
            transform: translateY(-50%) scale(1.1);
            background: #6c5ce7;
            color: white;
        }

        .carousel-btn.prev {
            left: -15px;
        }

        .carousel-btn.next {
            right: -15px;
        }

        /* MODAL DE IMAGEN AMPLIADA */
        .image-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .image-modal.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            position: relative;
            max-width: 90vw;
            max-height: 90vh;
        }

        .modal-content img {
            max-width: 100%;
            max-height: 90vh;
            border-radius: 20px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
        }

        .modal-close {
            position: absolute;
            top: -40px;
            right: 0;
            background: none;
            border: none;
            color: white;
            font-size: 30px;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .modal-close:hover {
            transform: scale(1.1);
        }

        .modal-prev,
        .modal-next {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .modal-prev:hover,
        .modal-next:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-50%) scale(1.1);
        }

        .modal-prev {
            left: 20px;
        }

        .modal-next {
            right: 20px;
        }

        .profile-info {
            text-align: center;
            margin-top: 15px;
        }

        .profile-name {
            font-size: 42px;
            font-weight: 700;
            color: #1e2b3a;
            margin-bottom: 8px;
        }

        .profile-name span {
            font-weight: 400;
            color: #5a6b7c;
            font-size: 36px;
        }

        .interests-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin: 15px auto;
            max-width: 100%;
        }

        .interest-tag {
            background: #f0f3fa;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 500;
            color: #2d3a4a;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s ease;
        }

        .interest-tag i {
            color: #6c5ce7;
        }

        .interest-tag.common {
            background: #ffd700;
            color: #1e2b3a;
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.3);
            transform: scale(1.05);
        }

        .interest-tag.common i {
            color: #1e2b3a;
        }

        .description {
            font-size: 16px;
            color: #5a6b7c;
            background: #f8f9ff;
            padding: 15px 25px;
            border-radius: 40px;
            margin: 15px auto;
            max-width: 90%;
            line-height: 1.5;
            border: 1px solid #e4e4f0;
        }

        .location-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            margin: 10px 0 25px;
        }

        .location-main {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 20px;
            color: #4a5b6e;
        }

        .location-main i {
            color: #6c5ce7;
        }

        .location-detail {
            font-size: 16px;
            color: #8a9bb0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .location-dot {
            width: 6px;
            height: 6px;
            background: #8a9bb0;
            border-radius: 50%;
        }

        .action-buttons {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin: 30px 0 10px;
            flex-wrap: wrap;
        }

        .action-btn {
            width: 75px;
            height: 75px;
            border-radius: 50%;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 15px 25px rgba(0, 0, 0, 0.1);
            flex-shrink: 0;
            position: relative;
        }

        .action-btn:hover {
            transform: scale(1.15);
        }

        .action-btn::after {
            content: attr(data-tooltip);
            position: absolute;
            bottom: -40px;
            left: 50%;
            transform: translateX(-50%);
            background: #2d3a4a;
            color: white;
            padding: 6px 15px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 500;
            white-space: nowrap;
            opacity: 0;
            visibility: hidden;
            transition: all 0.2s ease;
            pointer-events: none;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            z-index: 10;
        }

        .action-btn:hover::after {
            opacity: 1;
            visibility: visible;
            bottom: -45px;
        }

        .action-btn.like {
            background: #4a90e2;
            color: white;
        }

        .action-btn.super-like {
            background: #2ecc71;
            color: white;
        }

        .action-btn.gift {
            background: #ff6b6b;
            color: white;
        }

        .action-btn.message-reaction {
            background: #f39c12;
            color: white;
        }

        .action-btn.x {
            background: #2d3a4a;
            color: white;
        }

        .likes-notification {
            display: flex;
            justify-content: center;
            margin: 25px 0 15px;
        }

        .likes-badge {
            background: white;
            border-radius: 60px;
            padding: 12px 28px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            border: 1px solid #ffd7d7;
            display: inline-flex;
            align-items: center;
            gap: 15px;
        }

        .likes-badge i {
            color: #ff4757;
            font-size: 28px;
            filter: drop-shadow(0 3px 5px rgba(255, 71, 87, 0.3));
        }

        .likes-badge .likes-count {
            font-size: 32px;
            font-weight: 700;
            color: #1e2b3a;
            background: #f0f3fa;
            padding: 5px 20px;
            border-radius: 40px;
            min-width: 70px;
            text-align: center;
        }

        .footer-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: white;
            padding: 15px 20px;
            border-radius: 60px;
            border: 1px solid #eeeff5;
            margin-top: 20px;
            gap: 10px;
            width: 100%;
        }

        .footer-item {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 12px 20px;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s ease;
            flex: 1;
            white-space: nowrap;
            position: relative;
        }

        .footer-item::after {
            content: attr(data-tooltip);
            position: absolute;
            top: -40px;
            left: 50%;
            transform: translateX(-50%);
            background: #2d3a4a;
            color: white;
            padding: 6px 15px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 500;
            white-space: nowrap;
            opacity: 0;
            visibility: hidden;
            transition: all 0.2s ease;
            pointer-events: none;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .footer-item:hover::after {
            opacity: 1;
            visibility: visible;
            top: -45px;
        }

        .footer-item i {
            font-size: 24px;
        }

        .footer-item span {
            font-size: 18px;
            font-weight: 600;
        }

        .footer-item.inicio {
            background: #f0f3fa;
            color: #6c5ce7;
        }

        .footer-item.mensaje {
            background: linear-gradient(145deg, #6c5ce7, #8e6ce7);
            color: white;
            position: relative;
        }

        .footer-item.likes {
            background: #ff4757;
            color: white;
        }

        .footer-item.cuenta {
            background: #2d3a4a;
            color: white;
        }

        .footer-item:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        }

        /* Badge para mensajes no leídos */
        .mensaje-badge {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #ff4757;
            color: white;
            font-size: 12px;
            font-weight: 600;
            min-width: 22px;
            height: 22px;
            border-radius: 11px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 6px;
            border: 2px solid white;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
            z-index: 5;
        }

        .notification-container {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            pointer-events: none;
            width: auto;
            max-width: 90%;
        }

        .notification {
            background: white;
            color: #1e2b3a;
            padding: 16px 32px;
            border-radius: 60px;
            font-size: 18px;
            font-weight: 500;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            gap: 12px;
            animation: slideDown 0.3s ease;
            pointer-events: none;
        }

        .notification i {
            font-size: 24px;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeOut {
            from {
                opacity: 1;
                transform: translateY(0);
            }
            to {
                opacity: 0;
                transform: translateY(-30px);
            }
        }

        .no-more-profiles {
            text-align: center;
            padding: 40px;
            color: #5a6b7c;
        }

        .no-more-profiles i {
            font-size: 60px;
            color: #8a9bb0;
            margin-bottom: 20px;
        }

        .no-more-profiles p {
            font-size: 20px;
            font-weight: 500;
        }

        .loading-spinner {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 300px;
        }

        .loading-spinner i {
            font-size: 50px;
            color: #6c5ce7;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @media (max-width: 900px) {
            .app-container {
                padding: 20px;
            }

            .profile-card {
                padding: 30px 20px;
            }

            .avatar-carousel {
                max-width: 220px;
            }

            .carousel-container {
                width: 220px;
                height: 220px;
            }

            .carousel-item i {
                font-size: 100px;
            }
        }

        @media (max-width: 700px) {
            .header {
                padding: 12px 20px;
            }
            
            .logo {
                font-size: 30px;
            }
            
            .star-icon {
                font-size: 24px;
            }
            
            .carisma-badge, .boost-btn {
                padding: 6px 14px;
                font-size: 16px;
            }
            
            .carisma-num {
                padding: 3px 10px;
                font-size: 14px;
            }

            .monedas-container {
                justify-content: center;
                margin-bottom: 20px;
            }

            .profile-name {
                font-size: 36px;
            }

            .profile-name span {
                font-size: 30px;
            }

            .action-buttons {
                gap: 12px;
            }

            .action-btn {
                width: 65px;
                height: 65px;
                font-size: 28px;
            }

            .footer-nav {
                flex-wrap: wrap;
                gap: 8px;
            }
            
            .footer-item {
                flex: 1 1 calc(50% - 8px);
                min-width: 120px;
            }

            .likes-badge .likes-count {
                font-size: 28px;
                padding: 5px 15px;
            }
        }

        @media (max-width: 500px) {
            .avatar-carousel {
                max-width: 180px;
            }

            .carousel-container {
                width: 180px;
                height: 180px;
            }

            .carousel-item i {
                font-size: 80px;
            }

            .carousel-btn {
                width: 30px;
                height: 30px;
                font-size: 16px;
            }

            .profile-name {
                font-size: 32px;
            }

            .profile-name span {
                font-size: 26px;
            }

            .interest-tag {
                font-size: 14px;
                padding: 6px 12px;
            }

            .description {
                font-size: 14px;
                padding: 12px 20px;
            }

            .location-main {
                font-size: 18px;
            }

            .location-detail {
                font-size: 14px;
            }

            .action-buttons {
                gap: 8px;
            }

            .action-btn {
                width: 55px;
                height: 55px;
                font-size: 24px;
            }

            .action-btn::after {
                font-size: 12px;
                padding: 4px 10px;
            }

            .footer-item {
                padding: 10px 12px;
            }
            
            .footer-item i {
                font-size: 20px;
            }
            
            .footer-item span {
                font-size: 14px;
            }

            .likes-badge .likes-count {
                font-size: 24px;
                min-width: 60px;
            }
        }

        @media (max-width: 400px) {
            .header-right {
                flex-direction: row;
                width: auto;
            }
            
            .carisma-badge, .boost-btn {

                    .from('chats')

        // Filtrar nulos y ordenar por fecha del último mensaje o match

            function calcularDistancia(lat1, lon1, lat2, lon2) {
                if (!lat1 || !lon1 || !lat2 || !lon2) return null;
                
                const R = 6371;
                const dLat = (lat2 - lat1) * Math.PI / 180;
                const dLon = (lon2 - lon1) * Math.PI / 180;
                const a = 
                    Math.sin(dLat/2) * Math.sin(dLat/2) +
                    Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * 
                    Math.sin(dLon/2) * Math.sin(dLon/2);
                const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
                const distancia = R * c;
                return Math.round(distancia * 10) / 10;
            }

            // ============================================
            async function obtenerSiguientePerfil() {
                try {
                    // Obtener IDs de usuarios ya vistos (like, superlike o descartados)
                    
                    // 1. Obtener usuarios a los que ya diste like
                    const { data: likesDados } = await supabaseClient
                        .from('likes')
                        .select('id_usuario_destino')
                        .eq('id_usuario_origen', usuarioId);
                        
                    // 2. Obtener usuarios a los que ya diste super like
                    const { data: superLikesDados } = await supabaseClient
                        .from('superlikes')
                        .select('id_usuario_destino')
                        .eq('id_usuario_origen', usuarioId);
                        
                    // 3. Obtener usuarios con los que ya hay match (no mostrar)
                    const { data: matches } = await supabaseClient
                        .from('matches')
                        .select('*')
                        .or(`usuario1.eq.${usuarioId},usuario2.eq.${usuarioId}`);
                    
                    const usuariosConMatch = new Set();
                    matches?.forEach(match => {
                        if (match.usuario1 === usuarioId) {
                            usuariosConMatch.add(match.usuario2);
                        } else {
                            usuariosConMatch.add(match.usuario1);
                        }
                    });
                        
                    // 4. Combinar todos los IDs excluidos
                    const idsExcluidos = new Set();
                    
                    // Agregar IDs de likes dados
                    likesDados?.forEach(like => idsExcluidos.add(like.id_usuario_destino));
                    
                    // Agregar IDs de super likes dados
                    superLikesDados?.forEach(superlike => idsExcluidos.add(superlike.id_usuario_destino));
                    
                    // Agregar IDs de matches
                    usuariosConMatch.forEach(id => idsExcluidos.add(id));
                    
                    // Agregar IDs de descartados (de la sesión actual)
                    usuariosVistos.forEach(id => idsExcluidos.add(id));
                    
                    // Convertir Set a array para la consulta
                    const idsExcluidosArray = Array.from(idsExcluidos);
                    
                    console.log('IDs excluidos:', idsExcluidosArray);
                    
                    // Construir consulta
                    let query = supabaseClient
                        .from('usuarios')
                        .select(`
                            *,
                            pais: id_pais (nombre),
                            ciudad: id_ciudad (nombre)
                        `)
                        .neq('id_usuario', usuarioId); // No mostrar al usuario actual
                    
                    // Excluir IDs si hay alguno
                    if (idsExcluidosArray.length > 0) {
                        query = query.not('id_usuario', 'in', `(${idsExcluidosArray.join(',')})`);
                    }
                    
                    // Limitar a 1 resultado
                    const { data: usuarios, error } = await query.limit(1);

                    if (error) throw error;

                    if (!usuarios || usuarios.length === 0) {
                        return null;
                    }

                    const perfil = usuarios[0];
                    
                    const { principal, adicionales } = await obtenerFotosUsuario(perfil.id_usuario);
                    
                    // Obtener total de likes del perfil
                    const totalLikes = await obtenerTotalLikes(perfil.id_usuario);
                    
                    return {
                        ...perfil,
                        foto_principal: principal?.url_foto || perfil.foto_url,
                        fotos_adicionales: adicionales,
                        total_likes: totalLikes
                    };
                } catch (error) {
                    console.error('Error al obtener siguiente perfil:', error);
                    return null;
                }
            }

                    // Actualizar contador de notificaciones si estamos en la misma página
                    if (idUsuario === usuarioId) {

                } catch (error) {

            // ============================================
// FUNCIÓN PARA VERIFICAR Y CREAR MATCH (CORREGIDA)
// ============================================
async function verificarYCrearMatch(idDestino, tipo) {
    try {
        // Verificar si el otro usuario ya nos había dado like o super like
        const { data: likeRecibido } = await supabaseClient
            .from('likes')
            .select('*')
            .eq('id_usuario_origen', idDestino)
            .eq('id_usuario_destino', usuarioId)
            .maybeSingle();

        const { data: superLikeRecibido } = await supabaseClient
            .from('superlikes')
            .select('*')
            .eq('id_usuario_origen', idDestino)
            .eq('id_usuario_destino', usuarioId)
            .maybeSingle();

        // Si hay reciprocidad (el otro ya nos había dado like o super like)
        if (likeRecibido || superLikeRecibido) {
            // Verificar si ya existe un match entre estos usuarios
            const { data: matchExistente } = await supabaseClient
                .from('matches')
                .select('*')
                .or(`and(usuario1.eq.${usuarioId},usuario2.eq.${idDestino}),and(usuario1.eq.${idDestino},usuario2.eq.${usuarioId})`)
                .maybeSingle();

            if (!matchExistente) {
                // Crear el match (siempre guardar en orden para consistencia)
                const usuarioMenor = Math.min(usuarioId, idDestino);
                const usuarioMayor = Math.max(usuarioId, idDestino);
                
                const { data: nuevoMatch, error: matchError } = await supabaseClient
                    .from('matches')
                    .insert([{
                        usuario1: usuarioMenor,
                        usuario2: usuarioMayor,
                        fecha: new Date().toISOString()
                    }])
                    .select()
                    .single();

                if (matchError) throw matchError;

                // Crear chat para el match - IMPORTANTE: Guardar el id_match
                const { data: nuevoChat, error: chatError } = await supabaseClient
                    .from('chats')
                    .insert([{
                        id_match: nuevoMatch.id_match,
                        fecha_creacion: new Date().toISOString()
                    }])
                    .select()
                    .single();

                if (chatError) throw chatError;

                console.log('Match y chat creados:', { match: nuevoMatch, chat: nuevoChat });

                // Obtener información del otro usuario para la notificación
                const { data: otroUsuario } = await supabaseClient
                    .from('usuarios')
                    .select('nombre')
                    .eq('id_usuario', idDestino)
                    .single();

                // Crear notificación para el usuario actual
                await crearNotificacion(
                    usuarioId,
                    idDestino,
                    'match',
                    `💞 ¡Es un match con ${otroUsuario?.nombre || 'usuario'}! Ahora pueden chatear`
                );

                // Crear notificación para el otro usuario
                await crearNotificacion(
                    idDestino,
                    usuarioId,
                    'match',
                    `💞 ¡Es un match con ${usuarioActual.nombre}! Ahora pueden chatear`
                );

                // Mostrar notificación especial de match
                showNotification('fas fa-heart', `💞 ¡Es un match con ${otroUsuario?.nombre || 'usuario'}!`, '#ff6b6b', 'white');
                
                // Actualizar contadores
                await obtenerMatchesConInfo();
                await obtenerMensajesNoLeidos();
                
                return true;
            }
        } else {
            // No hay match aún, pero podemos notificar que recibió un like/superlike
            const { data: otroUsuario } = await supabaseClient
                .from('usuarios')
                .select('nombre')
                .eq('id_usuario', idDestino)
                .single();

            // Crear notificación para el otro usuario de que recibió un like/superlike
            const mensaje = tipo === 'like' 
                ? `❤️ ${usuarioActual.nombre} te ha dado un like`
                : `⭐ ${usuarioActual.nombre} te ha dado un super like`;

            await crearNotificacion(
                idDestino,
                usuarioId,
                tipo,
                mensaje
            );
        }
        return false;
    } catch (error) {
        console.error('Error al verificar/crear match:', error);
        return false;
    }
}

            async function enviarLike(idDestino) {
                try {

                        .from('likes')
                        .insert([{
                            id_usuario_origen: usuarioId,
                            id_usuario_destino: idDestino
                        }]);

                    if (error) {
                        if (error.code === '23505') {
                            return { success: false, message: 'Ya le diste like a esta persona' };
                        }
                        throw error;
                    }

                    // Verificar si hay match
                    const huboMatch = await verificarYCrearMatch(idDestino, 'like');
                    
                    return { success: true, match: huboMatch };
                } catch (error) {
                    console.error('Error al enviar like:', error);
                    return { success: false, message: 'Error al enviar like' };
                }
            }

                    fotosAdicionales.push(...perfil.fotos_adicionales.map(f => f.url_foto));
                }

                // Procesar intereses del perfil
                const interesesPerfil = perfil.intereses ? perfil.intereses.split(',').map(i => i.trim()) : [];
                
                // Encontrar intereses en común
                const interesesComunes = interesesUsuarioActual.filter(i => 
                    interesesPerfil.some(p => p.toLowerCase() === i.toLowerCase())

                // Determinar ubicación a mostrar

                let ubicacionDetalle = '';
                
                if (perfil.id_pais === usuarioActual.id_pais) {

                        usuarioActual.latitud, usuarioActual.longitud,
                        perfil.latitud, perfil.longitud
                    );

                        ubicacionDetalle = `A ${distancia} km de ti`;

                    if (ciudad) {

                    }

                const html = `
                    <div class="profile-card">
                        <div class="avatar-carousel" id="carousel">

                                        <div class="carousel-item">
                                            ${foto ?

                                                `<i class="fas fa-user-circle"></i>`
                                            }
                                        </div>
                                    `).join('')}
                                </div>
                                ${fotosAdicionales.length > 1 ? `
                                <div class="carousel-indicators" id="carouselIndicators">
                                    ${fotosAdicionales.map((_, index) => `
                                        <div class="indicator ${index === 0 ? 'active' : ''}" data-index="${index}"></div>
                                    `).join('')}

                                <button class="carousel-btn prev" id="carouselPrev"><i class="fas fa-chevron-left"></i></button>
                                <button class="carousel-btn next" id="carouselNext"><i class="fas fa-chevron-right"></i></button>
                                ` : ''}
                            </div>
                        </div>
                        
                        <div class="profile-info">
                            <div class="profile-name">
                                ${perfil.nombre || 'Usuario'}, <span>${perfil.edad || '?'}</span>
                            </div>
                            
                            <div class="interests-container">
                                ${interesesPerfil.map(interes => {
                                    const esComun = interesesComunes.some(i => i.toLowerCase() === interes.toLowerCase());
                                    return `
                                        <span class="interest-tag ${esComun ? 'common' : ''}">
                                            <i class="fas fa-${esComun ? 'star' : 'heart'}"></i>
                                            ${interes}
                                        </span>
                                    `;
                                }).join('')}
                            </div>
                            
                            ${perfil.sobre_mi ? `
                            <div class="description">
                                <i class="fas fa-quote-left" style="color: #8a9bb0; margin-right: 8px;"></i>
                                ${perfil.sobre_mi}
                            </div>
                            ` : ''}
                            
                            <div class="location-container">
                                <div class="location-main">
                                    <i class="fas fa-map-marker-alt"></i>
                                    ${ubicacionPrincipal}
                                </div>
                                ${ubicacionDetalle ? `
                                <div class="location-detail">
                                    <i class="fas fa-location-dot"></i>
                                    ${ubicacionDetalle}
                                </div>
                                ` : ''}
                            </div>
                        </div>

                        <div class="action-buttons">
                            <button class="action-btn x" id="btnX" data-tooltip="Descartar">
                                <i class="fas fa-times"></i>
                            </button>
                            <button class="action-btn like" id="btnLike" data-tooltip="Like">
                                <i class="fas fa-heart"></i>
                            </button>
                            <button class="action-btn super-like" id="btnSuperLike" data-tooltip="Super Like">
                                <i class="fas fa-star"></i>
                            </button>
                            <button class="action-btn gift" id="btnGift" data-tooltip="Enviar regalo">
                                <i class="fas fa-gift"></i>
                            </button>
                            <button class="action-btn message-reaction" id="btnReactionMessage" data-tooltip="Reaccionar con mensaje">
                                <i class="fas fa-comment"></i>

                        </div>

                        <div class="likes-notification">

                                <i class="fas fa-heart"></i>
                                <span class="likes-count" id="likesCount">${perfil.total_likes || 0}</span>
                            </div>
                        </div>
                    </div>
                `;

                profileContainer.innerHTML = html;

                // Configurar eventos del carrusel
                if (fotosAdicionales.length > 0) {
                    const slide = document.getElementById('carouselSlide');
                    const prevBtn = document.getElementById('carouselPrev');
                    const nextBtn = document.getElementById('carouselNext');
                    const indicators = document.querySelectorAll('.indicator');
                    const carouselContainer = document.getElementById('carouselContainer');

                    function actualizarCarrusel() {
                        if (slide) {
                            slide.style.transform = `translateX(-${indiceFotoActual * 100}%)`;
                        }
                        indicators.forEach((ind, idx) => {
                            if (idx === indiceFotoActual) {
                                ind.classList.add('active');
                            } else {

                    // Click en el carrusel para abrir modal
                    if (carouselContainer) {
                        carouselContainer.addEventListener('click', () => {

                        });
                    }

                    indicators.forEach(ind => {

                            actualizarCarrusel();
                        });

                }

                        .from('notificaciones')
                        .select('*', { count: 'exact', head: true })
                        .eq('id_usuario', usuarioId)
                        .eq('leida', false);

                    if (error) throw error;
                    
                    const badge = document.getElementById('notificacionesCount');
                    if (badge) {
                        badge.textContent = count || 0;
                        badge.style.display = count > 0 ? 'flex' : 'none';
                    }
                    
                    return count || 0;
                } catch (error) {
                    console.error('Error al cargar notificaciones:', error);
                    return 0;
                }
            }
