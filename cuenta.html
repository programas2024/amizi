<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Amizi · Mi Perfil</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #f2f2f7;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
        }

        .app-container {
            max-width: 900px;
            width: 100%;
            background-color: #f8f9ff;
            border-radius: 40px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.15);
            overflow: hidden;
            padding: 25px 20px;
            border: 1px solid rgba(255, 255, 255, 0.8);
        }

        @media (min-width: 768px) {
            .app-container {
                padding: 32px 36px;
                border-radius: 60px;
            }
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            background: linear-gradient(145deg, #4a90e2, #6c5ce7);
            padding: 12px 18px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            flex-wrap: wrap;
            gap: 8px;
            box-shadow: 0 10px 25px rgba(74, 144, 226, 0.3);
        }

        @media (min-width: 768px) {
            .header {
                padding: 15px 25px;
                margin-bottom: 24px;
            }
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .star-icon {
            color: #ffd700;
            font-size: 24px;
            filter: drop-shadow(0 2px 5px rgba(255, 215, 0, 0.5));
        }

        @media (min-width: 768px) {
            .star-icon {
                font-size: 28px;
            }
        }

        .logo {
            font-size: 28px;
            font-weight: 800;
            color: white;
            letter-spacing: -1px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
        }

        @media (min-width: 768px) {
            .logo {
                font-size: 36px;
            }
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .carisma-badge {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(5px);
            border-radius: 40px;
            padding: 6px 12px;
            font-size: 14px;
            font-weight: 600;
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            display: flex;
            align-items: center;
            gap: 5px;
            white-space: nowrap;
            transition: all 0.3s ease;
        }

        @media (min-width: 768px) {
            .carisma-badge {
                padding: 8px 18px;
                font-size: 18px;
                border-radius: 60px;
            }
        }

        .carisma-num {
            background: rgba(255, 255, 255, 0.4);
            border-radius: 30px;
            padding: 3px 10px;
            font-size: 12px;
            color: white;
            font-weight: 700;
            transition: all 0.3s ease;
        }

        @media (min-width: 768px) {
            .carisma-num {
                padding: 4px 14px;
                font-size: 16px;
            }
        }

        .badge-animation {
            animation: nivelUp 0.5s ease;
        }

        @keyframes nivelUp {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); background: #ffd700; color: #1e2b3a; }
            100% { transform: scale(1); }
        }

        .boost-btn {
            background: rgba(255, 255, 255, 0.95);
            border: none;
            border-radius: 40px;
            padding: 6px 14px;
            font-size: 14px;
            font-weight: 600;
            color: #4a90e2;
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        @media (min-width: 768px) {
            .boost-btn {
                padding: 8px 20px;
                font-size: 18px;
                border-radius: 60px;
            }
        }

        .boost-btn:hover {
            transform: scale(1.05);
            background: white;
        }

        .boost-btn i {
            color: #ff6b6b;
        }

        .popular-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            background: white;
            padding: 10px 18px;
            border-radius: 50px;
            border: 1px solid #eeeff5;
        }

        @media (min-width: 768px) {
            .popular-row {
                padding: 12px 25px;
                margin-bottom: 30px;
            }
        }

        .popular-tag {
            font-size: 16px;
            color: #2d3a4a;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        @media (min-width: 768px) {
            .popular-tag {
                font-size: 20px;
            }
        }

        .popular-tag i {
            color: #ff6b6b;
            font-size: 18px;
        }

        @media (min-width: 768px) {
            .popular-tag i {
                font-size: 22px;
            }
        }

        .menu-icon {
            font-size: 20px;
            color: #8a9bb0;
            cursor: pointer;
        }

        .profile-card {
            background: white;
            border-radius: 50px;
            padding: 25px 20px;
            border: 1px solid #f0f0f8;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.08);
            margin: 15px 0 20px 0;
            width: 100%;
        }

        @media (min-width: 768px) {
            .profile-card {
                border-radius: 70px;
                padding: 40px 40px 30px 40px;
                margin: 20px 0 30px 0;
            }
        }

        .photos-section {
            margin-bottom: 25px;
        }

        .section-title {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 20px;
            font-weight: 700;
            color: #1e2b3a;
            margin-bottom: 15px;
        }

        @media (min-width: 768px) {
            .section-title {
                font-size: 24px;
                gap: 10px;
                margin-bottom: 20px;
            }
        }

        .section-title i {
            color: #4a90e2;
            font-size: 22px;
        }

        @media (min-width: 768px) {
            .section-title i {
                font-size: 26px;
            }
        }

        .photos-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }

        @media (min-width: 768px) {
            .photos-grid {
                gap: 15px;
            }
        }

        .photo-item {
            aspect-ratio: 1;
            border-radius: 20px;
            background: #f0f3fa;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 2px dashed #8a9bb0;
            position: relative;
            overflow: hidden;
        }

        @media (min-width: 768px) {
            .photo-item {
                border-radius: 30px;
            }
        }

        .photo-item:hover {
            border-color: #4a90e2;
            transform: scale(1.02);
        }

        .photo-item.has-image {
            border: 2px solid #4a90e2;
        }

        .photo-item i {
            font-size: 30px;
            color: #8a9bb0;
        }

        @media (min-width: 768px) {
            .photo-item i {
                font-size: 40px;
            }
        }

        .photo-item:hover i {
            color: #4a90e2;
        }

        .photo-item .remove-photo {
            position: absolute;
            top: 3px;
            right: 3px;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: #ff6b6b;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 10;
            font-size: 12px;
        }

        @media (min-width: 768px) {
            .photo-item .remove-photo {
                top: 5px;
                right: 5px;
                width: 30px;
                height: 30px;
                font-size: 14px;
            }
        }

        .photo-item:hover .remove-photo {
            opacity: 1;
        }

        .photo-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .principal-badge {
            position: absolute;
            bottom: 3px;
            left: 3px;
            background: #ffd700;
            color: #1e2b3a;
            padding: 3px 6px;
            border-radius: 15px;
            font-size: 10px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 3px;
            z-index: 10;
        }

        @media (min-width: 768px) {
            .principal-badge {
                bottom: 5px;
                left: 5px;
                padding: 4px 8px;
                border-radius: 20px;
                font-size: 12px;
            }
        }

        .principal-badge i {
            font-size: 10px;
            color: #1e2b3a;
        }

        @media (min-width: 768px) {
            .principal-badge i {
                font-size: 12px;
            }
        }

        .make-primary {
            position: absolute;
            bottom: 3px;
            right: 3px;
            background: #4a90e2;
            color: white;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 10;
            font-size: 12px;
        }

        @media (min-width: 768px) {
            .make-primary {
                bottom: 5px;
                right: 5px;
                width: 30px;
                height: 30px;
                font-size: 14px;
            }
        }

        .photo-item:hover .make-primary {
            opacity: 1;
        }

        .make-primary:hover {
            background: #6c5ce7;
            transform: scale(1.1);
        }

        /* Estilos para edición automática */
        .editable-field {
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            padding: 5px 8px;
            border-radius: 30px;
        }

        .editable-field:hover {
            background: rgba(74, 144, 226, 0.1);
        }

        .editable-field::after {
            content: '\f044';
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            position: absolute;
            right: -15px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 12px;
            color: #4a90e2;
            opacity: 0;
            transition: opacity 0.2s;
        }

        @media (min-width: 768px) {
            .editable-field::after {
                right: -20px;
                font-size: 14px;
            }
        }

        .editable-field:hover::after {
            opacity: 1;
        }

        /* Indicador visual de que se está editando */
        .editing {
            position: relative;
            background: white !important;
            border-color: #4a90e2 !important;
            box-shadow: 0 0 0 2px #4a90e2, 0 5px 15px rgba(74, 144, 226, 0.2) !important;
            transition: all 0.2s ease;
        }

        /* Cuando termina la edición, volver a la normalidad */
        .info-item:not(.editing) {
            transition: all 0.3s ease;
        }

        .edit-input, .edit-select {
            width: 100%;
            padding: 8px 12px;
            border-radius: 30px;
            border: 2px solid #4a90e2;
            font-size: 14px;
            outline: none;
            background: white;
            transition: all 0.2s ease;
            margin-top: 5px;
        }

        @media (min-width: 768px) {
            .edit-input, .edit-select {
                padding: 8px 15px;
                font-size: 16px;
            }
        }

        .edit-input:focus, .edit-select:focus {
            box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.2);
        }

        /* Estilos para intereses */
        .intereses-modal {
            max-width: 500px;
            width: 95%;
            margin: 0 auto;
        }

        @media (min-width: 768px) {
            .intereses-modal {
                max-width: 600px;
                width: 90%;
            }
        }

        .intereses-categorias {
            display: flex;
            gap: 5px;
            overflow-x: auto;
            padding: 8px 0;
            margin-bottom: 10px;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .intereses-categorias::-webkit-scrollbar {
            display: none;
        }

        .categoria-tab {
            background: #f0f0f0;
            border: none;
            padding: 6px 12px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 500;
            color: #666;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.3s;
        }

        @media (min-width: 768px) {
            .categoria-tab {
                padding: 8px 16px;
                font-size: 14px;
            }
        }

        .categoria-tab.active {
            background: #6c5ce7;
            color: white;
        }

        .intereses-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            max-height: 250px;
            overflow-y: auto;
            padding: 5px;
            scrollbar-width: thin;
        }

        @media (min-width: 480px) {
            .intereses-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        /* Ocultar scrollbar pero mantener funcionalidad */
        .intereses-grid::-webkit-scrollbar {
            width: 3px;
        }

        .intereses-grid::-webkit-scrollbar-track {
            background: #f0f0f0;
            border-radius: 10px;
        }

        .intereses-grid::-webkit-scrollbar-thumb {
            background: #6c5ce7;
            border-radius: 10px;
        }

        .interes-btn {
            background: #f8f9ff;
            border-radius: 30px;
            padding: 10px 5px;
            cursor: pointer;
            text-align: center;
            font-size: 12px;
            font-weight: 500;
            border: 2px solid transparent;
            transition: all 0.3s;
            word-break: break-word;
        }

        @media (min-width: 768px) {
            .interes-btn {
                padding: 12px 8px;
                font-size: 14px;
            }
        }

        .interes-btn.selected {
            background: #6c5ce7;
            color: white;
        }

        .info-section {
            margin-bottom: 25px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }

        @media (min-width: 640px) {
            .info-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 20px;
            }
        }

        .info-item {
            background: #f8f9ff;
            border-radius: 30px;
            padding: 15px 18px;
            border: 1px solid #e4e4f0;
            transition: all 0.2s ease;
        }

        @media (min-width: 768px) {
            .info-item {
                border-radius: 40px;
                padding: 18px 25px;
            }
        }

        .info-item.editing {
            background: white;
            border-color: #4a90e2;
            box-shadow: 0 5px 15px rgba(74, 144, 226, 0.2);
        }

        .info-label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            color: #5a6b7c;
            margin-bottom: 5px;
        }

        @media (min-width: 768px) {
            .info-label {
                gap: 8px;
                font-size: 16px;
                margin-bottom: 8px;
            }
        }

        .info-label i {
            color: #4a90e2;
            font-size: 16px;
        }

        @media (min-width: 768px) {
            .info-label i {
                font-size: 18px;
            }
        }

        .info-value {
            font-size: 16px;
            font-weight: 600;
            color: #1e2b3a;
            padding-left: 22px;
            word-break: break-word;
        }

        @media (min-width: 768px) {
            .info-value {
                font-size: 20px;
                padding-left: 26px;
            }
        }

        .info-value.description {
            font-size: 14px;
            font-weight: 400;
            line-height: 1.4;
        }

        @media (min-width: 768px) {
            .info-value.description {
                font-size: 18px;
                line-height: 1.5;
            }
        }

        .full-width {
            grid-column: 1 / -1;
        }

        .options-container {
            margin: 15px 0 10px;
            border-radius: 30px;
            background: #f0f3fa;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .options-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 18px;
            cursor: pointer;
            background: #f0f3fa;
            border-radius: 40px;
            transition: all 0.2s ease;
        }

        @media (min-width: 768px) {
            .options-header {
                padding: 16px 25px;
                border-radius: 50px;
            }
        }

        .options-header:hover {
            background: #e4e9f5;
        }

        .options-header-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .options-header-left i {
            font-size: 18px;
            color: #6c5ce7;
            transition: transform 0.3s ease;
        }

        @media (min-width: 768px) {
            .options-header-left i {
                font-size: 22px;
            }
        }

        .options-header-left span {
            font-size: 16px;
            font-weight: 600;
            color: #2d3a4a;
        }

        .options-header .arrow {
            font-size: 18px;
            color: #6c5ce7;
            transition: transform 0.3s ease;
        }

        .options-header.open .arrow {
            transform: rotate(180deg);
        }

        .options-content {
            max-height: 0;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            padding: 0 15px;
        }

        .options-content.open {
            max-height: 300px;
            opacity: 1;
            visibility: visible;
            padding: 15px;
        }

        .options-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        @media (min-width: 480px) {
            .options-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        .option-btn {
            background: white;
            border: 1px solid #e4e4f0;
            border-radius: 30px;
            padding: 10px 5px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.02);
        }

        .option-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.05);
        }

        .option-btn i {
            font-size: 18px;
            transition: all 0.2s ease;
        }

        .option-btn span {
            font-size: 11px;
            font-weight: 500;
            color: #2d3a4a;
            text-align: center;
        }

        .option-btn::after {
            content: attr(data-tooltip);
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            background: #2d3a4a;
            color: white;
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 10px;
            white-space: nowrap;
            opacity: 0;
            visibility: hidden;
            transition: all 0.2s ease;
            margin-top: 5px;
            pointer-events: none;
            z-index: 10;
        }

        .option-btn:hover::after {
            opacity: 1;
            visibility: visible;
        }

        .option-btn.privacidad i { color: #4a90e2; }
        .option-btn.privacidad:hover { background: #4a90e2; border-color: #4a90e2; }
        .option-btn.faq i { color: #6c5ce7; }
        .option-btn.faq:hover { background: #6c5ce7; border-color: #6c5ce7; }
        .option-btn.soporte i { color: #ff6b6b; }
        .option-btn.soporte:hover { background: #ff6b6b; border-color: #ff6b6b; }
        .option-btn.test i { color: #2ecc71; }
        .option-btn.test:hover { background: #2ecc71; border-color: #2ecc71; }
        .option-btn:hover i, .option-btn:hover span { color: white; }

        .footer-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: white;
            padding: 10px 12px;
            border-radius: 50px;
            border: 1px solid #eeeff5;
            margin-top: 15px;
            gap: 5px;
            width: 100%;
        }

        @media (min-width: 768px) {
            .footer-nav {
                padding: 15px 20px;
                border-radius: 60px;
                margin-top: 20px;
                gap: 10px;
            }
        }

        .footer-item {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            padding: 8px 10px;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s ease;
            flex: 1;
            white-space: nowrap;
            position: relative;
            font-size: 12px;
        }

        @media (min-width: 480px) {
            .footer-item {
                padding: 10px 15px;
                font-size: 14px;
                gap: 6px;
            }
        }

        @media (min-width: 768px) {
            .footer-item {
                padding: 12px 20px;
                font-size: 18px;
                gap: 10px;
            }
        }

        .footer-item::after {
            content: attr(data-tooltip);
            position: absolute;
            top: -35px;
            left: 50%;
            transform: translateX(-50%);
            background: #2d3a4a;
            color: white;
            padding: 4px 10px;
            border-radius: 30px;
            font-size: 11px;
            white-space: nowrap;
            opacity: 0;
            visibility: hidden;
            transition: all 0.2s ease;
            pointer-events: none;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .footer-item:hover::after {
            opacity: 1;
            visibility: visible;
            top: -40px;
        }

        .footer-item i { font-size: 18px; }
        .footer-item span { font-size: 12px; font-weight: 600; }

        @media (min-width: 480px) {
            .footer-item i { font-size: 20px; }
            .footer-item span { font-size: 14px; }

            function asignarEventosFotos() {
                const photoPrincipal = document.getElementById('photo1');
                photoPrincipal.removeEventListener('click', manejarClickFotoPrincipal);
                photoPrincipal.addEventListener('click', manejarClickFotoPrincipal);

                document.querySelectorAll('#photo2, #photo3, #photo4').forEach(item => {
                    item.removeEventListener('click', manejarClickFotoAdicional);
                    item.addEventListener('click', manejarClickFotoAdicional);
                });

                document.querySelectorAll('.remove-photo[data-foto-id]').forEach(btn => {
                    btn.removeEventListener('click', manejarEliminar);
                    btn.addEventListener('click', manejarEliminar);
                });

                document.querySelectorAll('.make-primary[data-foto-id]').forEach(btn => {
                    btn.removeEventListener('click', manejarHacerPrincipal);
                    btn.addEventListener('click', manejarHacerPrincipal);
                });
            }

            async function manejarClickFotoPrincipal(e) {
                if (editando) return;
                e.stopPropagation();
                if (e.target.closest('.remove-photo') || e.target.closest('.make-primary')) return;

                const photoItem = this;
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = 'image/jpeg,image/png,image/jpg,image/gif,image/webp';
                
                input.onchange = async function(e) {
                    const file = e.target.files[0];
                    if (!file) return;
                    
                    if (file.size > 5 * 1024 * 1024) {
                        showNotification('fas fa-exclamation-triangle', 'La imagen no debe superar 5MB', '#ff6b6b', 'white');
                        return;
                    }
                    
                    if (!file.type.startsWith('image/')) {
                        showNotification('fas fa-exclamation-triangle', 'Solo se permiten imágenes', '#ff6b6b', 'white');
                        return;
                    }

                    photoItem.style.pointerEvents = 'none';
                    await subirFotoPrincipal(file, photoItem);
                    photoItem.style.pointerEvents = 'auto';
                };
                
                input.click();
            }

            async function manejarClickFotoAdicional(e) {
                if (editando) return;
                e.stopPropagation();
                if (e.target.closest('.remove-photo') || e.target.closest('.make-primary')) return;

                const photoItem = this;

                const input = document.createElement('input');
                input.type = 'file';
                input.accept = 'image/jpeg,image/png,image/jpg,image/gif,image/webp';
                
                input.onchange = async function(e) {
                    const file = e.target.files[0];
                    if (!file) return;
                    
                    if (file.size > 5 * 1024 * 1024) {
                        showNotification('fas fa-exclamation-triangle', 'La imagen no debe superar 5MB', '#ff6b6b', 'white');
                        return;
                    }
                    
                    if (!file.type.startsWith('image/')) {
                        showNotification('fas fa-exclamation-triangle', 'Solo se permiten imágenes', '#ff6b6b', 'white');
                        return;
                    }

                    photoItem.style.pointerEvents = 'none';
                    await subirFotoAdicional(file, photoItem);
                    photoItem.style.pointerEvents = 'auto';
                };
                
                input.click();
            }

            async function subirFotoPrincipal(file, photoItem) {
                try {
                    const progressDiv = photoItem.querySelector('.upload-progress');
                    const progressBar = photoItem.querySelector('.upload-progress-bar');
                    
                    if (progressDiv) progressDiv.style.display = 'block';

                    let progress = 0;
                    const interval = setInterval(() => {
                        progress += 10;
                        if (progressBar) progressBar.style.width = progress + '%';
                        if (progress >= 90) clearInterval(interval);
                    }, 100);

                    const fileExt = file.name.split('.').pop();
                    const fileName = `${Date.now()}_${Math.random().toString(36).substring(2)}.${fileExt}`;
                    const filePath = `usuario_${usuarioId}/principales/${fileName}`;

                    const { error: uploadError } = await supabaseClient.storage
                        .from('fotos-perfil')
                        .upload(filePath, file, {
                            cacheControl: '3600',
                            upsert: false,
                            contentType: file.type
                        });

                    if (uploadError) throw uploadError;

                    const { data: urlData } = supabaseClient.storage
                        .from('fotos-perfil')
                        .getPublicUrl(filePath);

                    clearInterval(interval);
                    if (progressBar) progressBar.style.width = '100%';

                    if (fotoPrincipalId) {
                        await supabaseClient
                            .from('fotos_usuario')
                            .update({ 
                                url_foto: urlData.publicUrl,
                                fecha: new Date().toISOString()
                            })
                            .eq('id_foto', fotoPrincipalId);
                    } else {
                        const { data: fotoGuardada, error: dbError } = await supabaseClient
                            .from('fotos_usuario')
                            .insert([{
                                id_usuario: usuarioId,
                                url_foto: urlData.publicUrl,
                                principal: true,
                                fecha: new Date().toISOString()
                            }])
                            .select();

                        if (dbError) throw dbError;
                        fotoPrincipalId = fotoGuardada[0].id_foto;
                    }

                    await supabaseClient
                        .from('usuarios')
                        .update({ foto_url: urlData.publicUrl })
                        .eq('id_usuario', usuarioId);

                    setTimeout(() => {
                        if (progressDiv) progressDiv.style.display = 'none';
                        
                        const fotoImg = document.getElementById('fotoPerfilImg');
                        const fotoPlaceholder = document.getElementById('fotoPlaceholder');
                        
                        fotoImg.src = urlData.publicUrl;
                        fotoImg.style.display = 'block';
                        fotoPlaceholder.style.display = 'none';
                        
                        showNotification('fas fa-camera', '📸 Foto principal actualizada', '#4a90e2', 'white');
                    }, 500);

                } catch (error) {
                    console.error('Error:', error);
                    showNotification('fas fa-exclamation-triangle', 'Error al subir foto', '#ff6b6b', 'white');
                }
            }

            async function subirFotoAdicional(file, photoItem) {
                try {
                    const progressDiv = photoItem.querySelector('.upload-progress');
                    const progressBar = photoItem.querySelector('.upload-progress-bar');
                    
                    if (progressDiv) progressDiv.style.display = 'block';

                    let progress = 0;
                    const interval = setInterval(() => {
                        progress += 10;
                        if (progressBar) progressBar.style.width = progress + '%';
                        if (progress >= 90) clearInterval(interval);
                    }, 100);

                    const fileExt = file.name.split('.').pop();
                    const fileName = `${Date.now()}_${Math.random().toString(36).substring(2)}.${fileExt}`;
                    const filePath = `usuario_${usuarioId}/adicionales/${fileName}`;

                    const { error: uploadError } = await supabaseClient.storage
                        .from('fotos-perfil')
                        .upload(filePath, file, {
                            cacheControl: '3600',
                            upsert: false,
                            contentType: file.type
                        });

                    if (uploadError) throw uploadError;

                    const { data: urlData } = supabaseClient.storage
                        .from('fotos-perfil')
                        .getPublicUrl(filePath);

                    clearInterval(interval);
                    if (progressBar) progressBar.style.width = '100%';

                    const { data: fotoGuardada, error: dbError } = await supabaseClient
                        .from('fotos_usuario')
                        .insert([{
                            id_usuario: usuarioId,
                            url_foto: urlData.publicUrl,
                            principal: false,
                            fecha: new Date().toISOString()
                        }])
                        .select();

                    if (dbError) throw dbError;

                    setTimeout(() => {
                        if (progressDiv) progressDiv.style.display = 'none';
                        
                        photoItem.innerHTML = `
                            <img src="${urlData.publicUrl}" alt="Foto" style="width: 100%; height: 100%; object-fit: cover;">
                            <div class="remove-photo" data-foto-id="${fotoGuardada[0].id_foto}">
                                <i class="fas fa-times"></i>
                            </div>
                            <div class="make-primary" data-foto-id="${fotoGuardada[0].id_foto}" title="Hacer principal">
                                <i class="fas fa-star"></i>
                            </div>
                            <div class="upload-progress" style="display: none;">
                                <div class="upload-progress-bar"></div>
                            </div>
                        `;
                        photoItem.classList.add('has-image');

                        const removeBtn = photoItem.querySelector('.remove-photo');
                        if (removeBtn) {
                            removeBtn.addEventListener('click', manejarEliminar);
                        }
                        const makePrimaryBtn = photoItem.querySelector('.make-primary');
                        if (makePrimaryBtn) {
                            makePrimaryBtn.addEventListener('click', manejarHacerPrincipal);
                        }

                        showNotification('fas fa-camera', '📸 Foto subida correctamente', '#4a90e2', 'white');
                        actualizarNivelEnBD();
                    }, 500);

                } catch (error) {
                    console.error('Error:', error);
                    showNotification('fas fa-exclamation-triangle', 'Error al subir foto', '#ff6b6b', 'white');
                }
            }

            async function manejarEliminar(e) {
                if (editando) return;
                e.stopPropagation();
                const btn = e.currentTarget;
                const fotoId = btn.getAttribute('data-foto-id');
                const photoItem = btn.closest('.photo-item');

                const result = await Swal.fire({
                    title: '¿Eliminar foto?',
                    text: 'Esta acción no se puede deshacer',
                    icon: 'warning',
                    showCancelButton: true,
                    confirmButtonColor: '#ff6b6b',
                    cancelButtonColor: '#888',
                    confirmButtonText: 'Eliminar',
                    cancelButtonText: 'Cancelar',
                    background: 'white'
                });

                if (!result.isConfirmed) return;

                try {
                    const { error } = await supabaseClient
                        .from('fotos_usuario')
                        .delete()
                        .eq('id_foto', fotoId);

                    if (error) throw error;

                    const orden = photoItem.id === 'photo2' ? '2' : (photoItem.id === 'photo3' ? '3' : '4');
                    photoItem.innerHTML = `
                        <i class="fas fa-plus"></i>
                        <div class="make-primary" title="Hacer principal">
                            <i class="fas fa-star"></i>
                        </div>
                        <div class="upload-progress" style="display: none;">
                            <div class="upload-progress-bar"></div>
                        </div>
                    `;
                    photoItem.classList.remove('has-image');
                    
                    photoItem.removeEventListener('click', manejarClickFotoAdicional);
                    photoItem.addEventListener('click', manejarClickFotoAdicional);

                    showNotification('fas fa-trash', '🗑️ Foto eliminada', '#ff6b6b', 'white');
                    actualizarNivelEnBD();

                } catch (error) {
                    console.error('Error:', error);
                    showNotification('fas fa-exclamation-triangle', 'Error al eliminar foto', '#ff6b6b', 'white');
                }
            }

            async function manejarHacerPrincipal(e) {
                if (editando) return;
                e.stopPropagation();
                const btn = e.currentTarget;
                const fotoId = btn.getAttribute('data-foto-id');
                const photoItem = btn.closest('.photo-item');
                const nuevaFotoUrl = photoItem.querySelector('img').src;

                const result = await Swal.fire({
                    title: '¿Hacer foto principal?',
                    text: 'Esta foto se establecerá como tu foto de perfil',
                    icon: 'question',
                    showCancelButton: true,
                    confirmButtonColor: '#4a90e2',
                    cancelButtonColor: '#888',
                    confirmButtonText: 'Sí, hacer principal',
                    cancelButtonText: 'Cancelar',
                    background: 'white'
                });

                if (!result.isConfirmed) return;

                try {
                    if (fotoPrincipalId) {
                        await supabaseClient
                            .from('fotos_usuario')
                            .update({ principal: false })
                            .eq('id_foto', fotoPrincipalId);
                    }

                    await supabaseClient
                        .from('fotos_usuario')
                        .update({ principal: true })
                        .eq('id_foto', fotoId);

                    await supabaseClient
                        .from('usuarios')
                        .update({ foto_url: nuevaFotoUrl })
                        .eq('id_usuario', usuarioId);

                    fotoPrincipalId = fotoId;
                    fotoPrincipalUrl = nuevaFotoUrl;
                    
                    cargarFotoPrincipal(nuevaFotoUrl);

                    photoItem.innerHTML = `
                        <i class="fas fa-plus"></i>
                        <div class="make-primary" title="Hacer principal">
                            <i class="fas fa-star"></i>
                        </div>
                        <div class="upload-progress" style="display: none;">
                            <div class="upload-progress-bar"></div>
                        </div>
                    `;
                    photoItem.classList.remove('has-image');
                    
                    photoItem.removeEventListener('click', manejarClickFotoAdicional);
                    photoItem.addEventListener('click', manejarClickFotoAdicional);

                    showNotification('fas fa-star', '✨ Foto principal actualizada', '#ffd700', '#1e2b3a');

                } catch (error) {
                    console.error('Error:', error);
                    showNotification('fas fa-exclamation-triangle', 'Error al actualizar foto principal', '#ff6b6b', 'white');
                }
            }

            // ============================================
            // FUNCIÓN PARA MOSTRAR NOTIFICACIONES
            // ============================================
            function showNotification(icon, text, bgColor = '#ffffff', iconColor = '#6c5ce7') {
                const container = document.getElementById('notificationContainer');
                const notification = document.createElement('div');
                notification.className = 'notification';
                notification.innerHTML = `<i class="${icon}" style="color: ${iconColor}"></i> ${text}`;
                notification.style.background = bgColor;
                
                container.appendChild(notification);

                setTimeout(() => {
                    notification.style.animation = 'fadeOut 0.3s ease';
                    setTimeout(() => {
                        if (container.contains(notification)) {
                            container.removeChild(notification);
                        }
                    }, 300);
                }, 2500);
            }
